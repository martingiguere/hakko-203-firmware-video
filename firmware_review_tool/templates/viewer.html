<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frame Viewer — Hakko FM-203</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
            background: #f5f5f5;
            color: #222;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        #info-bar {
            background: #e8eaf0;
            border-bottom: 1px solid #ccc;
            display: flex;
            align-items: center;
            padding: 8px 16px;
            gap: 20px;
            font-size: 13px;
            flex-shrink: 0;
        }

        #info-bar .label { color: #666; }
        #info-bar .value { font-weight: bold; color: #222; }

        #jump-group {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        #jump-input {
            width: 80px;
            padding: 3px 6px;
            font-family: inherit;
            font-size: 13px;
            border: 1px solid #aaa;
            border-radius: 3px;
        }

        #jump-btn, #jump-frame-btn {
            padding: 3px 10px;
            font-family: inherit;
            font-size: 12px;
            border: 1px solid #aaa;
            border-radius: 3px;
            background: #fff;
            cursor: pointer;
        }
        #jump-btn:hover, #jump-frame-btn:hover { background: #e0e0e0; }

        #frame-container {
            flex: 1;
            overflow: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 8px;
        }

        #frame-img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        #nav-bar {
            background: #e8eaf0;
            border-top: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 16px;
            gap: 8px;
            flex-shrink: 0;
        }

        .nav-btn {
            padding: 6px 14px;
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #aaa;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            min-width: 56px;
            text-align: center;
        }
        .nav-btn:hover { background: #e0e0e0; }
        .nav-btn:active { background: #d0d0d0; }

        #shortcuts {
            font-size: 11px;
            color: #888;
            margin-left: 20px;
        }
    </style>
</head>
<body>

<div id="info-bar">
    <span><span class="label">Frame </span><span class="value" id="frame-num">1</span><span class="label"> / {{ TOTAL_FRAMES }}</span></span>
    <span><span class="label">Segment </span><span class="value" id="seg-time">0:00.0</span></span>
    <span><span class="label">YouTube </span><span class="value" id="yt-time">13:41</span></span>
    <div id="jump-group">
        <label class="label" for="jump-input">Jump MM:SS</label>
        <input id="jump-input" type="text" placeholder="16:40">
        <button id="jump-btn">Go</button>
        <label class="label" for="jump-frame-input">Frame #</label>
        <input id="jump-frame-input" type="text" placeholder="5370" style="width:64px;padding:3px 6px;font-family:inherit;font-size:13px;border:1px solid #aaa;border-radius:3px;">
        <button id="jump-frame-btn">Go</button>
    </div>
</div>

<div id="frame-container">
    <img id="frame-img" alt="Frame">
</div>

<div id="nav-bar">
    <button class="nav-btn" data-delta="-100">-100</button>
    <button class="nav-btn" data-delta="-10">-10</button>
    <button class="nav-btn" data-delta="-1">-1</button>
    <button class="nav-btn" data-delta="1">+1</button>
    <button class="nav-btn" data-delta="10">+10</button>
    <button class="nav-btn" data-delta="100">+100</button>
    <span id="shortcuts">Keys: Arrow ±1 &nbsp; Shift+Arrow ±10 &nbsp; Ctrl+Arrow ±100</span>
</div>

<script>
(function() {
    const SEGMENT_START = {{ SEGMENT_START }};
    const FPS = {{ FPS }};
    const TOTAL_FRAMES = {{ TOTAL_FRAMES }};

    let currentFrame = 1;

    const frameNumEl = document.getElementById('frame-num');
    const segTimeEl = document.getElementById('seg-time');
    const ytTimeEl = document.getElementById('yt-time');
    const frameImg = document.getElementById('frame-img');
    const jumpInput = document.getElementById('jump-input');
    const jumpFrameInput = document.getElementById('jump-frame-input');

    function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

    function fmtTime(totalSec) {
        const m = Math.floor(totalSec / 60);
        const s = Math.floor(totalSec % 60);
        return m + ':' + String(s).padStart(2, '0');
    }

    function fmtSegTime(totalSec) {
        const m = Math.floor(totalSec / 60);
        const s = (totalSec % 60).toFixed(1);
        return m + ':' + (s < 10 ? '0' : '') + s;
    }

    function goToFrame(n) {
        n = clamp(n, 1, TOTAL_FRAMES);
        currentFrame = n;
        frameNumEl.textContent = n;

        const offsetSec = (n - 1) / FPS;
        segTimeEl.textContent = fmtSegTime(offsetSec);

        const ytSec = SEGMENT_START + offsetSec;
        ytTimeEl.textContent = fmtTime(ytSec);

        frameImg.src = '/api/frame/' + n;
    }

    function navigate(delta) {
        goToFrame(currentFrame + delta);
    }

    // Parse MM:SS or plain seconds into YouTube absolute seconds
    function parseTimestamp(str) {
        str = str.trim();
        if (str.includes(':')) {
            const parts = str.split(':');
            if (parts.length === 2) {
                return parseInt(parts[0], 10) * 60 + parseFloat(parts[1]);
            }
        }
        return parseFloat(str);
    }

    function jumpToTimestamp() {
        const val = jumpInput.value;
        if (!val) return;
        const ytSec = parseTimestamp(val);
        if (isNaN(ytSec)) return;
        const offsetSec = ytSec - SEGMENT_START;
        const frame = Math.round(offsetSec * FPS) + 1;
        goToFrame(frame);
    }

    function jumpToFrame() {
        const val = jumpFrameInput.value.trim();
        if (!val) return;
        const n = parseInt(val, 10);
        if (isNaN(n)) return;
        goToFrame(n);
    }

    // Button clicks
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => navigate(parseInt(btn.dataset.delta, 10)));
    });
    document.getElementById('jump-btn').addEventListener('click', jumpToTimestamp);
    document.getElementById('jump-frame-btn').addEventListener('click', jumpToFrame);
    jumpInput.addEventListener('keydown', e => { if (e.key === 'Enter') jumpToTimestamp(); });
    jumpFrameInput.addEventListener('keydown', e => { if (e.key === 'Enter') jumpToFrame(); });

    // Keyboard navigation
    document.addEventListener('keydown', e => {
        // Don't capture when typing in inputs
        if (e.target.tagName === 'INPUT') return;

        if (e.key === 'ArrowRight' || e.key === 'ArrowUp') {
            e.preventDefault();
            navigate(e.ctrlKey ? 100 : e.shiftKey ? 10 : 1);
        } else if (e.key === 'ArrowLeft' || e.key === 'ArrowDown') {
            e.preventDefault();
            navigate(e.ctrlKey ? -100 : e.shiftKey ? -10 : -1);
        }
    });

    // Initial load
    goToFrame(1);
})();
</script>

</body>
</html>
